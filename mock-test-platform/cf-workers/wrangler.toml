name = "mock-test-platform"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV namespaces
[[kv_namespaces]]
binding = "TENANT_ROUTING"    # tenant_id -> { pg_host, schema, group_id, tier }
id = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

# R2 buckets
[[r2_buckets]]
binding = "ECDN"              # event CDN — DO writes event batch files here
bucket_name = "mock-test-ecdn"

[[r2_buckets]]
binding = "CCDN"              # content CDN — CGS writes weakness snapshots here
bucket_name = "mock-test-ccdn"

# Durable Objects
[[durable_objects.bindings]]
name = "BATCH_DO"             # 1 serialized writer per tenant
class_name = "BatchDO"

[[migrations]]
tag = "v1"
new_classes = ["BatchDO"]

# Environment variables (non-secret)
[vars]
REGION_A = "ap-south-1"
REGION_B = "ap-southeast-1"
SETTINGS_UPDATE_LIMIT = "3"   # lifetime update count per user [!]

# Secrets (set via: wrangler secret put SECRET_NAME)
# JWT_SECRET
# TENANT_RP_HOST_A       RDS Proxy endpoint for tenant DBs (region A) — CF Workers don't use this directly
# TENANT_RP_HOST_B       RDS Proxy endpoint for tenant DBs (region B) — CF Workers don't use this directly

[env.production]
name = "mock-test-platform-prod"
