AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Mock Test Platform — Lambda Services

Globals:
  Function:
    Runtime: python3.12
    Timeout: 900          # 15 min max
    MemorySize: 512
    Environment:
      Variables:
        GLOBAL_RP_HOST: !Sub "{{resolve:secretsmanager:mock-test/global-rds-proxy:SecretString:host}}"
        TENANT_RP_HOST_A: !Sub "{{resolve:secretsmanager:mock-test/tenant-rds-proxy-a:SecretString:host}}"
        TENANT_RP_HOST_B: !Sub "{{resolve:secretsmanager:mock-test/tenant-rds-proxy-b:SecretString:host}}"
        DB_PORT: "5432"
        ECDN_BUCKET: mock-test-ecdn
        CCDN_BUCKET: mock-test-ccdn
        ENV: !Ref Env

Parameters:
  Env:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, production]

Resources:

  # ── EPS — Event Processing Service ─────────────────────────────────────────
  EPSFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "mock-test-eps-${Env}"
      Handler: eps/handler.lambda_handler
      CodeUri: .
      Description: Polls ECDN, chunks 100 events, writes to tenant PG, triggers CGS
      Events:
        Poll5Min:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
        Poll30Min:
          Type: Schedule
          Properties:
            Schedule: rate(30 minutes)
        EarlyMorning:
          Type: Schedule
          Properties:
            Schedule: cron(0 21,22,23,0 * * ? *)   # 3-7AM IST = 21:00-01:00 UTC
      Policies:
        - S3ReadPolicy:
            BucketName: mock-test-ecdn
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:mock-test/*"

  # ── CGS — Content Gen Service ───────────────────────────────────────────────
  CGSFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "mock-test-cgs-${Env}"
      Handler: cgs/handler.lambda_handler
      CodeUri: .
      Description: Joins results+questions, computes weakness snapshot, pushes to CCDN
      Policies:
        - S3WritePolicy:
            BucketName: mock-test-ccdn
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:mock-test/*"

  # ── BS — Bundle Service ─────────────────────────────────────────────────────
  BSFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "mock-test-bs-${Env}"
      Handler: bs/handler.lambda_handler
      CodeUri: .
      Description: Builds exam/subject bundles, writes SHA-256 manifest to R2
      Policies:
        - S3WritePolicy:
            BucketName: mock-test-ccdn
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:mock-test/*"

  # ── TPS — Tenant Provisioning Service ──────────────────────────────────────
  TPSFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "mock-test-tps-${Env}"
      Handler: tps/handler.lambda_handler
      CodeUri: .
      Description: Provisions new tenant schema, Alembic migrations, R2 folders, KV, enc_secret
      Timeout: 300
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:mock-test/*"

  # ── TGM — Tenant Growth Monitor ────────────────────────────────────────────
  TGMFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "mock-test-tgm-${Env}"
      Handler: tgm/handler.lambda_handler
      CodeUri: .
      Description: Daily composite trigger check; promotes/demotes/extracts tenants
      Events:
        Daily2AM:
          Type: Schedule
          Properties:
            Schedule: cron(30 20 * * ? *)    # 2AM IST = 20:30 UTC
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:mock-test/*"

  # ── TMS — Tenant Migration Service ─────────────────────────────────────────
  TMSFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "mock-test-tms-${Env}"
      Handler: tms/handler.lambda_handler
      CodeUri: .
      Description: 5-phase migration — provision, DW activate, backfill, verify, cutover
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:mock-test/*"
