<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1A3A5C">
  <title>RRB Group D CBT</title>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            header:    '#1A3A5C',
            subheader: '#2D5986',
            answered:  '#43A047',
            wrong:     '#E53935',
            notvisit:  '#9E9E9E',
            review:    '#8E24AA',
            reviewed:  '#6A1B9A',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 font-sans">

  <!-- Loading -->
  <div id="loading" class="fixed inset-0 flex flex-col items-center justify-center bg-white z-50">
    <div class="w-10 h-10 border-4 border-header border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-gray-600">Loading exam session…</p>
  </div>

  <!-- Exam Shell -->
  <div id="shell" class="hidden h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-header text-white px-4 py-2 flex items-center justify-between shrink-0">
      <div>
        <div id="exam-name" class="font-bold text-sm"></div>
        <div id="candidate-info" class="text-xs text-blue-200"></div>
      </div>
      <div id="section-tabs" class="flex gap-1"></div>
      <div class="text-right">
        <div class="text-xs text-blue-200">Time Left</div>
        <div id="timer" class="font-mono font-bold text-lg">01:30:00</div>
      </div>
    </header>

    <!-- Main -->
    <div class="flex flex-1 overflow-hidden">

      <!-- Question Panel -->
      <div class="flex-1 flex flex-col overflow-y-auto bg-white p-4">
        <div class="flex items-center justify-between mb-3">
          <span id="q-number" class="bg-gray-100 px-3 py-1 rounded font-semibold text-sm"></span>
          <div class="flex gap-2 text-sm">
            <button onclick="setLang('en')" id="lang-en" class="px-2 py-1 rounded border border-blue-400 text-blue-600 font-medium">English</button>
            <span class="text-gray-400">•</span>
            <button onclick="setLang('hi')" id="lang-hi" class="px-2 py-1 rounded border border-gray-300 text-gray-500">हिंदी</button>
          </div>
        </div>

        <div id="q-text-en" class="text-base text-gray-800 mb-4 leading-relaxed"></div>
        <div id="q-text-hi" class="text-base text-gray-800 mb-4 leading-relaxed hidden"></div>
        <div id="q-loading" class="text-gray-400 text-sm hidden">Loading question…</div>
        <div id="q-options" class="flex flex-col gap-2"></div>
      </div>

      <!-- Sidebar -->
      <aside class="w-64 bg-gray-50 border-l border-gray-200 flex flex-col shrink-0 overflow-y-auto">
        <div class="bg-subheader text-white text-sm font-semibold px-3 py-2">Question Palette</div>

        <!-- Legend -->
        <div id="palette-legend" class="px-3 py-2 flex flex-col gap-1 text-xs border-b border-gray-200"></div>

        <!-- Palette Grid -->
        <div id="palette-container" class="px-3 py-2 flex-1"></div>

        <!-- Summary -->
        <div id="sidebar-summary" class="px-3 py-2 border-t border-gray-200 text-xs text-gray-600"></div>
      </aside>

    </div>

    <!-- Action Bar -->
    <footer class="bg-white border-t border-gray-200 px-4 py-2 flex items-center justify-between shrink-0">
      <div class="flex gap-2">
        <button onclick="markReview()" class="bg-review text-white text-sm px-3 py-2 rounded hover:bg-reviewed transition">Mark for Review &amp; Next</button>
        <button onclick="clearResponse()" class="border border-gray-300 text-gray-700 text-sm px-3 py-2 rounded hover:bg-gray-50 transition">Clear Response</button>
      </div>
      <div class="flex gap-2">
        <button onclick="navigate(-1)" class="border border-gray-300 text-gray-700 text-sm px-3 py-2 rounded hover:bg-gray-50 transition">← Previous</button>
        <button onclick="saveAndNext()" class="bg-blue-700 text-white text-sm px-4 py-2 rounded hover:bg-blue-800 transition">Save &amp; Next →</button>
        <button onclick="openSubmitModal()" class="bg-wrong text-white text-sm px-3 py-2 rounded hover:bg-red-700 transition">Submit</button>
      </div>
    </footer>

  </div>

  <!-- Submit Modal -->
  <div id="modal-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-40 flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-xl w-96 p-6">
      <h3 class="text-lg font-bold text-gray-800 mb-4">Submit Exam?</h3>
      <div id="modal-summary" class="text-sm text-gray-600 mb-6 space-y-1"></div>
      <div class="flex gap-3 justify-end">
        <button onclick="closeSubmitModal()" class="border border-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-50">Go Back</button>
        <button onclick="submitExam()" class="bg-wrong text-white px-4 py-2 rounded hover:bg-red-700">Yes, Submit</button>
      </div>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" class="hidden min-h-screen bg-gray-100 p-6">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow p-6">
      <h2 class="text-2xl font-bold text-header mb-6">Exam Result</h2>
      <div id="result-score-box" class="mb-6"></div>
      <div id="result-section-table" class="mb-6"></div>
      <button onclick="location.reload()" class="bg-blue-700 text-white px-6 py-2 rounded hover:bg-blue-800">Take Another Test</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
